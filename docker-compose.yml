services:
  mongodb:
    image: mongo:latest
    container_name: vox-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - vox-network

  redis:
    image: redis:alpine
    container_name: vox-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - vox-network

  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=${SERVER_URL}
      - DOCKER_ENV=true
      - AUTH_TYPE=apikey
      - AUTHENTICATION_API_KEY=${AUTHENTICATION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_TYPE=mongodb
      - DATABASE_CONNECTION_URI=mongodb://mongodb:27017/evolution?authSource=admin
      - DATABASE_SAVE_DATA_INSTANCE=false
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - WEBHOOK_EVENTS_STATUS_INSTANCE=true
      - WEBHOOK_EVENTS_SESSIONS_STATUS=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://vox-backend:3000/evolution/webhook/evolution
      - WEBHOOK_EVENTS_ERRORS=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=true
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=true
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=true
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=true
      - WEBHOOK_EVENTS_CHATS_UPSERT=true
      - WEBHOOK_EVENTS_CHATS_UPDATE=true
      - WEBHOOK_EVENTS_CHATS_DELETE=true
      - WEBHOOK_EVENTS_GROUPS_UPSERT=true
      - WEBHOOK_EVENTS_GROUPS_UPDATE=true
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
    volumes:
      - ./evolution-api:/evolution/instances
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - mongodb
      - redis
    networks:
      - vox-network

  vox-backend:
    build:
      context: ./vox-backend
    container_name: vox-backend
    restart: always
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - PORT=${PORT}
      - MONGO_URI=${MONGO_URI}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - mongodb
      - redis
      - evolution-api
    networks:
      - vox-network

networks:
  vox-network:
    driver: bridge
